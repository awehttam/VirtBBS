{{define "forgot_password.html"}}
{{template "header" .}}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card mb-3">
      <div class="card-body">
      <div class="card-header"><h2 class="h5 mb-0">{{t .Locale "forgot.title"}} — {{.BBSName}}</h2></div>
      <div class="card-body">
        <p class="meta">{{t .Locale "forgot.help"}}</p>
        {{if .Flash}}<div class="alert alert-success py-2">{{.Flash}}</div>{{end}}
        {{if .Error}}<div class="alert alert-danger py-2">{{.Error}}</div>{{end}}
        {{if .ResetURL}}
        <div class="mb-3">
          <input type="text" readonly class="form-control share-url font-monospace" value="{{.ResetURL}}" onclick="this.select()">
        </div>
        {{else}}
        <form method="post" action="/forgot-password">
          <div class="mb-3">
            <label class="form-label" for="username">{{t .Locale "login.username"}}</label>
            <input type="text" class="form-control" id="username" name="username" value="{{.Username}}" required autofocus>
          </div>
          <button type="submit" class="btn btn-primary">{{t .Locale "forgot.submit"}}</button>
        </form>
        {{end}}
        <p class="meta mt-3 mb-0"><a href="/login">{{t .Locale "login.submit"}}</a></p>
      </div>
      </div>
    </div>
  </div>
</div>
{{template "footer" .}}
{{end}}
