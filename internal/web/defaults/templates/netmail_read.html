{{define "netmail_read.html"}}
{{template "header" .}}
<div class="panel">
  <p><a href="/netmail">← Netmail</a></p>
  <h2>{{.Message.Subject}}</h2>
  <p class="meta">
    From <strong>{{.Message.FromName}}</strong> to {{.Message.ToName}}
    · {{.Message.DatePosted.Format "2006-01-02 15:04"}}
  </p>
  <div class="msg-body">{{.Message.Body}}</div>
</div>
{{template "footer" .}}
{{end}}
