{{define "register_welcome.html"}}
{{template "header" .}}
<div class="panel">
  <h2>{{t .Locale "register_welcome.title"}}</h2>
  <p class="flash">{{tf .Locale "register_welcome.welcome" .User.Name}}</p>
  {{if .WelcomeHTML}}
  <div class="ansi-screen">{{.WelcomeHTML | safeHTML}}</div>
  {{end}}
  <p><a class="btn" href="/menu">{{t .Locale "register_welcome.continue"}}</a></p>
</div>
{{template "footer" .}}
{{end}}
