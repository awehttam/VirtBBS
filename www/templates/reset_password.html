{{define "reset_password.html"}}
{{template "header" .}}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card mb-3">
      <div class="card-body">
      <div class="card-header"><h2 class="h5 mb-0">{{t .Locale "reset.title"}}</h2></div>
      <div class="card-body">
        {{if .Flash}}
        <div class="alert alert-success py-2">{{.Flash}}</div>
        <p class="mb-0"><a href="/login">{{t .Locale "login.submit"}}</a></p>
        {{end}}
        {{if .Error}}<div class="alert alert-danger py-2">{{.Error}}</div>{{end}}
        {{if .Token}}
        <form method="post" action="/reset-password?token={{.Token}}">
          <div class="mb-3">
            <label class="form-label" for="password">{{t .Locale "login.password"}}</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="new-password">
          </div>
          <div class="mb-3">
            <label class="form-label" for="password_confirm">{{t .Locale "reset.confirm"}}</label>
            <input type="password" class="form-control" id="password_confirm" name="password_confirm" required autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary">{{t .Locale "reset.submit"}}</button>
        </form>
        {{end}}
      </div>
      </div>
    </div>
  </div>
</div>
{{template "footer" .}}
{{end}}
