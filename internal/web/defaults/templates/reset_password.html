{{define "reset_password.html"}}
{{template "header" .}}
<div class="login-box panel">
  <h2>{{t .Locale "reset.title"}}</h2>
  {{if .Flash}}<p class="flash">{{.Flash}}</p><p><a href="/login">{{t .Locale "login.submit"}}</a></p>{{end}}
  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
  {{if .Token}}
  <form method="post" action="/reset-password?token={{.Token}}">
    <label for="password">{{t .Locale "login.password"}}</label>
    <input type="password" id="password" name="password" required autocomplete="new-password">
    <label for="password_confirm">Confirm</label>
    <input type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password">
    <button type="submit">{{t .Locale "reset.submit"}}</button>
  </form>
  {{end}}
</div>
{{template "footer" .}}
{{end}}
