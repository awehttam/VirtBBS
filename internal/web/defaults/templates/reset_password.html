{{define "reset_password.html"}}
{{template "header" .}}
<div class="card mb-3">
  <div class="card-header"><h2 class="h5 mb-0">{{t .Locale "reset.title"}}</h2></div>
  <div class="card-body">
  {{if .Flash}}<p class="alert alert-success">{{.Flash}}</p><p><a href="/login">{{t .Locale "login.submit"}}</a></p>{{end}}
  {{if .Error}}<p class="alert alert-danger">{{.Error}}</p>{{end}}
  {{if .Token}}
  <form method="post" action="/reset-password?token={{.Token}}">
    <div class="mb-3">
      <label for="password" class="form-label">{{t .Locale "login.password"}}</label>
    <input class="form-control" type="password" id="password" name="password" required autocomplete="new-password">
    </div>
    <div class="mb-3">
      <label for="password_confirm" class="form-label">{{t .Locale "reset.confirm"}}</label>
    <input class="form-control" type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password">
    </div>
    <button class="btn btn-primary" type="submit">{{t .Locale "reset.submit"}}</button>
  </form>
  {{end}}
  </div>
</div>
{{template "footer" .}}
{{end}}
